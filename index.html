<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AgaHub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f0b;
  color: white;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: #0f1a0f;
  border-bottom: 2px solid #00ff88;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  color: #00ff88;
  text-shadow: 0 0 10px #00ff88;
}

.search {
  padding: 8px;
  border-radius: 8px;
  border: none;
  outline: none;
  width: 200px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* CARD */
.card {
  background: #111a11;
  border: 1px solid #1f3a1f;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
  border-color: #00ff88;
  box-shadow: 0 0 15px #00ff88;
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.card-title {
  padding: 10px;
  text-align: center;
  color: #00ff88;
  font-weight: bold;
}

/* PLAYER */
#player {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
}

#closeBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: red;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  z-index: 10;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">💚 AgaHub</div>
  <input class="search" id="search" placeholder="Search games..." />
</div>

<div class="grid" id="grid"></div>

<!-- GAME PLAYER -->
<div id="player">
  <button id="closeBtn" onclick="closeGame()">X</button>
  <iframe id="frame"></iframe>
</div>

<script>

// 🎮 CLEAN GAME LIST (ONLY URLS)
const games = [
  {
    title: "Bad Piggies",
    thumbnail: "PASTE_THUMBNAIL_URL",
    link: "https://pd70p97.live.codepad.app/Bad%20Piggies.html"
  }
];

const grid = document.getElementById("grid");

function loadGames(list = games) {
  grid.innerHTML = "";

  list.forEach(game => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${game.thumbnail}">
      <div class="card-title">${game.title}</div>
    `;

    card.onclick = () => openGame(game);
    grid.appendChild(card);
  });
}

function openGame(game) {
  document.getElementById("frame").src = game.link;
  document.getElementById("player").style.display = "block";
}

function closeGame() {
  document.getElementById("player").style.display = "none";
  document.getElementById("frame").src = "";
}

// SEARCH
document.getElementById("search").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();
  const filtered = games.filter(g =>
    g.title.toLowerCase().includes(value)
  );
  loadGames(filtered);
});

loadGames();

</script>

</body>
</html>
