<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AgaHub v4</title>

<style>
:root{
  --bg:#070c07;
  --panel:#0f1a0f;
  --card:#111a11;
  --text:#ffffff;
  --accent:#00ff88;
}

/* LIGHT MODE */
body.light{
  --bg:#f2f2f2;
  --panel:#ffffff;
  --card:#e8e8e8;
  --text:#111;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* TOPBAR */
.topbar{
  position:sticky;
  top:0;
  z-index:50;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:var(--panel);
  border-bottom:2px solid var(--accent);
}

.logo{
  color:var(--accent);
  font-weight:bold;
}

.search{
  width:40%;
  padding:8px;
  border:none;
  border-radius:8px;
}

button{
  cursor:pointer;
}

/* GRID (4 per row) */
.grid{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:12px;
  padding:15px;
}

@media(max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:500px){
  .grid{grid-template-columns:repeat(1,1fr);}
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid #1f3a1f;
  border-radius:12px;
  overflow:hidden;
  transition:transform .2s, opacity .4s, transform .4s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 12px var(--accent);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card-title{
  text-align:center;
  padding:8px;
  color:var(--accent);
}

/* EXIT + ENTER ANIMATION */
.slide-out{
  transform:translateX(-120%);
  opacity:0;
}

.slide-in{
  transform:translateX(-120%);
  opacity:0;
  animation:in .4s forwards;
}

@keyframes in{
  to{
    transform:translateX(0);
    opacity:1;
  }
}

/* HERO */
.hero{
  margin:12px;
  height:180px;
  border-radius:12px;
  overflow:hidden;
  position:relative;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.heroText{
  position:absolute;
  bottom:10px;
  left:10px;
  background:rgba(0,0,0,0.5);
  padding:6px 10px;
  color:var(--accent);
}

/* PLAYER */
#player{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:100;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

.closeBtn,.fullBtn{
  position:absolute;
  top:10px;
  z-index:101;
  border:none;
  padding:8px 12px;
}

.closeBtn{right:10px;background:red;color:white;}
.fullBtn{left:10px;background:var(--accent);}

/* SETTINGS */
.settings{
  position:fixed;
  right:-300px;
  top:0;
  width:260px;
  height:100%;
  background:var(--panel);
  border-left:2px solid var(--accent);
  transition:.3s;
  padding:15px;
  z-index:200;
}

.settings.open{
  right:0;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">💚 AgaHub</div>
  <input id="search" class="search" placeholder="Search games...">
  <button onclick="toggleSettings()">⚙</button>
</div>

<div class="hero">
  <img id="heroImg">
  <div class="heroText" id="heroText"></div>
</div>

<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div id="player">
  <button class="fullBtn" onclick="full()">⛶</button>
  <button class="closeBtn" onclick="closeGame()">X</button>
  <iframe id="frame"></iframe>
</div>

<!-- SETTINGS -->
<div class="settings" id="settings">
  <h3 style="color:var(--accent)">Settings</h3>

  <button onclick="toggleTheme()">Light/Dark Mode</button>
  <br><br>

  Accent Color:<br>
  <input type="color" id="colorPicker">

  <br><br>
  <button onclick="closeSettings()">Close</button>
</div>

<script>

const games = [
  {title:"Bad Piggies", img:"https://upload.wikimedia.org/wikipedia/en/3/3e/Bad_Piggies_app_icon.png", link:"https://badpig.vercel.app/", featured:true},

  {title:"Crazy Cattle", img:"https://via.placeholder.com/150", link:"https://crazy-cattle.github.io/"},

  {title:"Slope", img:"https://via.placeholder.com/150", link:"https://slopegame.github.io/"},

  {title:"Run 3", img:"https://via.placeholder.com/150", link:"https://run3.io/"},

  {title:"Shell Shockers", img:"https://via.placeholder.com/150", link:"https://shellshock.io/"},

  {title:"Drift Hunters", img:"https://via.placeholder.com/150", link:"https://drift-hunters.co/"},

  {title:"Minecraft Classic", img:"https://via.placeholder.com/150", link:"https://classic.minecraft.net/"},

  {title:"Tunnel Rush", img:"https://via.placeholder.com/150", link:"https://tunnelrush.github.io/"},

  {title:"Paper.io", img:"https://via.placeholder.com/150", link:"https://paper-io.com/"}
];

let heroIndex=0;

function load(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  games.forEach((g,i)=>{
    const c=document.createElement("div");
    c.className="card slide-in";
    c.style.animationDelay=(i*30)+"ms";

    c.innerHTML=`<img src="${g.img}"><div class="card-title">${g.title}</div>`;
    c.onclick=()=>openGame(g,c);
    grid.appendChild(c);
  });

  hero();
}

function hero(){
  const f=games.filter(g=>g.featured||g.title==="Bad Piggies");
  const g=f[heroIndex%f.length];
  document.getElementById("heroImg").src=g.img;
  document.getElementById("heroText").innerText=g.title;
  heroIndex++;
}

setInterval(hero,4000);

/* GAME OPEN */
function openGame(g,card){
  document.querySelectorAll(".card").forEach(c=>{
    c.classList.add("slide-out");
  });

  setTimeout(()=>{
    document.getElementById("frame").src=g.link;
    document.getElementById("player").style.display="block";
  },400);
}

function closeGame(){
  document.getElementById("player").style.display="none";
  document.getElementById("frame").src="";
  load();
}

function full(){
  document.getElementById("frame").requestFullscreen();
}

/* SEARCH */
document.getElementById("search").addEventListener("input",(e)=>{
  const v=e.target.value.toLowerCase();
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  games.filter(g=>g.title.toLowerCase().includes(v))
  .forEach(g=>{
    const c=document.createElement("div");
    c.className="card slide-in";
    c.innerHTML=`<img src="${g.img}"><div class="card-title">${g.title}</div>`;
    c.onclick=()=>openGame(g,c);
    grid.appendChild(c);
  });
});

/* SETTINGS */
function toggleSettings(){
  document.getElementById("settings").classList.toggle("open");
}

function closeSettings(){
  document.getElementById("settings").classList.remove("open");
}

/* THEME */
const picker=document.getElementById("colorPicker");

picker.value=localStorage.getItem("accent")||"#00ff88";
document.documentElement.style.setProperty("--accent",picker.value);

picker.oninput=(e)=>{
  document.documentElement.style.setProperty("--accent",e.target.value);
  localStorage.setItem("accent",e.target.value);
};

function toggleTheme(){
  document.body.classList.toggle("light");
}

load();

</script>

</body>
</html>
