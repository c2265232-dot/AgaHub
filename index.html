<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AgaHub</title>

<style>
:root{
  --bg:#070c07;
  --panel:#0f1a0f;
  --card:#111a11;
  --text:#ffffff;
  --accent:#00ff88;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

/* 🌞 LIGHT MODE FIX */
body.light{
  --bg:#f2f2f2;
  --panel:#ffffff;
  --card:#e9e9e9;
  --text:#111;
  --accent:#0a8f55;
}

/* TOPBAR */
.topbar{
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:space-between;
  padding:10px;
  background:var(--panel);
  border-bottom:2px solid var(--accent);
}

.logo{
  color:var(--accent);
  font-weight:bold;
}

.search{
  flex:1;
  padding:8px;
  border-radius:8px;
  border:none;
}

/* CATEGORIES */
.categories{
  display:flex;
  gap:8px;
  padding:10px;
  overflow-x:auto;
}

.cat{
  padding:6px 10px;
  border-radius:20px;
  background:var(--card);
  cursor:pointer;
  white-space:nowrap;
}

.cat.active{
  background:var(--accent);
  color:black;
}

/* ♾️ RECOMMENDED CAROUSEL */
.carousel{
  overflow:hidden;
  padding:10px;
}

.track{
  display:flex;
  width:max-content;
  animation:scroll 18s linear infinite;
}

@keyframes scroll{
  from{transform:translateX(0);}
  to{transform:translateX(-50%);}
}

.bigCard{
  width:260px;
  height:150px;
  margin-right:10px;
  border-radius:12px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  flex-shrink:0;
}

.bigCard img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.bigCard span{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,.5);
  padding:6px;
  color:var(--accent);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

@media(max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:500px){
  .grid{grid-template-columns:repeat(1,1fr);}
}

/* CARD */
.card{
  background:var(--card);
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card-title{
  padding:8px;
  display:flex;
  justify-content:space-between;
  color:var(--accent);
}

/* PLAYER */
#player{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:999;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

.btn{
  position:absolute;
  top:10px;
  padding:10px;
  border:none;
  z-index:1000;
}

.close{right:10px;background:red;color:white;}
.full{left:10px;background:var(--accent);}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">💚 AgaHub</div>
  <input class="search" id="search" placeholder="Search games...">
  <button onclick="toggleTheme()">🌓</button>
</div>

<div class="categories" id="cats"></div>

<!-- 🔥 RECOMMENDED -->
<div class="carousel" id="carousel">
  <div class="track" id="track"></div>
</div>

<div class="grid" id="grid"></div>

<div id="player">
  <button class="btn full" onclick="full()">⛶</button>
  <button class="btn close" onclick="closeGame()">X</button>
  <iframe id="frame"></iframe>
</div>

<script>

/* 🎮 BIG GAME LIST */
const games = [
  {t:"Bad Piggies",i:"https://upload.wikimedia.org/wikipedia/en/3/3e/Bad_Piggies_app_icon.png",l:"https://badpig.vercel.app/",c:"Popular",f:true},
  {t:"Crazy Cattle",i:"https://crazy-cattle.github.io/favicon.ico",l:"https://crazy-cattle.github.io/",c:"Action",f:true},
  {t:"Slope",i:"https://slopegame.github.io/favicon.ico",l:"https://slopegame.github.io/",c:"Action",f:true},
  {t:"Run 3",i:"https://i.imgur.com/7Q9Q9Qp.png",l:"https://run3.io/",c:"Action"},
  {t:"Shell Shockers",i:"https://shellshock.io/favicon.ico",l:"https://shellshock.io/",c:"Action"},
  {t:"Tunnel Rush",i:"https://tunnelrush.github.io/favicon.ico",l:"https://tunnelrush.github.io/",c:"Action"},
  {t:"Paper.io",i:"https://paper-io.com/favicon.ico",l:"https://paper-io.com/",c:"Puzzle"},
  {t:"Drift Hunters",i:"https://drifthunters2.io/favicon.ico",l:"https://drifthunters2.io/",c:"Racing"},
  {t:"Retro Bowl",i:"https://retrobowl.co/favicon.ico",l:"https://retrobowl.co/",c:"Sports"}
];

let cat="All";
let fav=JSON.parse(localStorage.getItem("fav")||"[]");

/* 🌙 THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* CATEGORIES */
const cats=["All","Popular","Action","Puzzle","Racing","Sports","Favorites"];
const box=document.getElementById("cats");

cats.forEach(c=>{
  const d=document.createElement("div");
  d.className="cat";
  d.innerText=c;
  if(c==="All")d.classList.add("active");

  d.onclick=()=>{
    document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
    d.classList.add("active");
    cat=c;
    render();
  };

  box.appendChild(d);
});

/* ⭐ FAVORITES */
function toggleFav(t){
  if(fav.includes(t))fav=fav.filter(x=>x!==t);
  else fav.push(t);
  localStorage.setItem("fav",JSON.stringify(fav));
  render();
}

/* ♾️ RECOMMENDED (INFINITE LOOP FIX) */
function loadRecommended(){
  const track=document.getElementById("track");
  const rec=games.filter(g=>g.f);

  // duplicate for perfect infinite loop
  const loop=[...rec,...rec,...rec];

  track.innerHTML=loop.map(g=>`
    <div class="bigCard" onclick="openGame('${g.l}')">
      <img src="${g.i}">
      <span>${g.t}</span>
    </div>
  `).join("");
}

/* GRID */
function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  let list=games;

  if(cat==="Favorites")list=list.filter(g=>fav.includes(g.t));
  else if(cat!=="All")list=list.filter(g=>g.c===cat);

  list.forEach(g=>{
    const c=document.createElement("div");
    c.className="card";

    const star=fav.includes(g.t)?"⭐":"☆";

    c.innerHTML=`
      <img src="${g.i}">
      <div class="card-title">
        ${g.t}
        <span onclick="event.stopPropagation();toggleFav('${g.t}')">${star}</span>
      </div>
    `;

    c.onclick=()=>openGame(g.l);
    grid.appendChild(c);
  });

  loadRecommended();
}

/* SEARCH FIX */
document.getElementById("search").addEventListener("input",(e)=>{
  const v=e.target.value.toLowerCase();
  const grid=document.getElementById("grid");

  grid.innerHTML="";

  games.filter(g=>g.t.toLowerCase().includes(v)).forEach(g=>{
    const c=document.createElement("div");
    c.className="card";

    c.innerHTML=`
      <img src="${g.i}">
      <div class="card-title">${g.t}</div>
    `;

    c.onclick=()=>openGame(g.l);
    grid.appendChild(c);
  });
});

/* GAME */
function openGame(l){
  document.getElementById("frame").src=l;
  document.getElementById("player").style.display="block";
}

function closeGame(){
  document.getElementById("player").style.display="none";
  document.getElementById("frame").src="";
}

function full(){
  document.getElementById("frame").requestFullscreen();
}

render();

</script>

</body>
</html>
