<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AgaHub v5</title>

<style>
:root{
  --bg:#070c07;
  --panel:#0f1a0f;
  --card:#111a11;
  --text:#fff;
  --accent:#00ff88;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* LOADING SCREEN */
#loading{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}

.loader{
  width:60px;
  height:60px;
  border:4px solid #222;
  border-top:4px solid var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:var(--panel);
  border-bottom:2px solid var(--accent);
}

.logo{color:var(--accent);font-weight:bold;}

.search{
  width:40%;
  padding:8px;
}

/* CATEGORIES */
.categories{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
}

.cat{
  padding:6px 10px;
  background:#1a2a1a;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}

.cat.active{
  background:var(--accent);
  color:black;
}

/* FEATURED CAROUSEL (MOVES LEFT) */
.featured{
  overflow:hidden;
  white-space:nowrap;
  padding:10px;
}

.featuredTrack{
  display:inline-flex;
  gap:10px;
  animation:scrollLeft 18s linear infinite;
}

@keyframes scrollLeft{
  from{transform:translateX(0);}
  to{transform:translateX(-50%);}
}

.featuredCard{
  min-width:180px;
  background:var(--card);
  border-radius:10px;
  overflow:hidden;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

@media(max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:500px){
  .grid{grid-template-columns:repeat(1,1fr);}
}

/* GAME CARD */
.card{
  background:var(--card);
  border-radius:10px;
  overflow:hidden;
  transform:translateX(-40px);
  opacity:0;
  animation:slideIn .4s forwards;
}

@keyframes slideIn{
  to{
    transform:translateX(0);
    opacity:1;
  }
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card-title{
  padding:8px;
  color:var(--accent);
  display:flex;
  justify-content:space-between;
}

/* PLAYER */
#player{
  display:none;
  position:fixed;
  inset:0;
  background:black;
}

iframe{width:100%;height:100%;border:none;}

.closeBtn{
  position:absolute;
  right:10px;
  top:10px;
  background:red;
  color:white;
  border:none;
  padding:10px;
  z-index:1000;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div class="loader"></div>
  <p style="color:var(--accent)">Loading AgaHub...</p>
</div>

<!-- TOP -->
<div class="topbar">
  <div class="logo">💚 AgaHub</div>
  <input id="search" class="search" placeholder="Search games...">
</div>

<!-- CATEGORIES -->
<div class="categories" id="cats"></div>

<!-- FEATURED -->
<div class="featured">
  <div class="featuredTrack" id="featuredTrack"></div>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div id="player">
  <button class="closeBtn" onclick="closeGame()">X</button>
  <iframe id="frame"></iframe>
</div>

<script>

const games = [
  {title:"Bad Piggies",img:"https://upload.wikimedia.org/wikipedia/en/3/3e/Bad_Piggies_app_icon.png",link:"https://badpig.vercel.app/",cat:"Popular",fav:false,featured:true},
  {title:"Crazy Cattle",img:"https://via.placeholder.com/200",link:"https://crazy-cattle.github.io/",cat:"Action"},
  {title:"Slope",img:"https://via.placeholder.com/200",link:"https://slopegame.github.io/",cat:"Action"},
  {title:"Run 3",img:"https://via.placeholder.com/200",link:"https://run3.io/",cat:"Action"},
  {title:"Shell Shockers",img:"https://via.placeholder.com/200",link:"https://shellshock.io/",cat:"Action"},
  {title:"Tunnel Rush",img:"https://via.placeholder.com/200",link:"https://tunnelrush.github.io/",cat:"Action"},
  {title:"Paper.io",img:"https://via.placeholder.com/200",link:"https://paper-io.com/",cat:"Puzzle"}
];

let currentCat="All";
let favs=JSON.parse(localStorage.getItem("favs")||"[]");

/* LOADING SCREEN */
setTimeout(()=>{
  document.getElementById("loading").style.display="none";
},1200);

/* CATEGORIES */
const cats=["All","Popular","Action","Puzzle","Favorites"];

const catBox=document.getElementById("cats");

cats.forEach(c=>{
  const d=document.createElement("div");
  d.className="cat";
  d.innerText=c;
  if(c==="All")d.classList.add("active");

  d.onclick=()=>{
    document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
    d.classList.add("active");
    currentCat=c;
    render();
  };

  catBox.appendChild(d);
});

/* FEATURED */
function loadFeatured(){
  const f=document.getElementById("featuredTrack");
  const list=games.filter(g=>g.featured);

  f.innerHTML=list.concat(list).map(g=>
    `<div class="featuredCard"><img src="${g.img}" style="width:100%"><div style="padding:5px;color:var(--accent)">${g.title}</div></div>`
  ).join("");
}

/* FAVORITE */
function toggleFav(title){
  if(favs.includes(title))favs=favs.filter(f=>f!==title);
  else favs.push(title);
  localStorage.setItem("favs",JSON.stringify(favs));
  render();
}

/* GRID */
function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  let list=games;

  if(currentCat!=="All"){
    if(currentCat==="Favorites"){
      list=list.filter(g=>favs.includes(g.title));
    }else{
      list=list.filter(g=>g.cat===currentCat);
    }
  }

  list.forEach(g=>{
    const c=document.createElement("div");
    c.className="card";

    const star=favs.includes(g.title)?"⭐":"☆";

    c.innerHTML=`
      <img src="${g.img}">
      <div class="card-title">
        ${g.title}
        <span onclick="event.stopPropagation();toggleFav('${g.title}')">${star}</span>
      </div>
    `;

    c.onclick=()=>openGame(g);
    grid.appendChild(c);
  });
}

/* GAME */
function openGame(g){
  document.getElementById("frame").src=g.link;
  document.getElementById("player").style.display="block";
}

function closeGame(){
  document.getElementById("player").style.display="none";
  document.getElementById("frame").src="";
}

/* SEARCH */
document.getElementById("search").oninput=(e)=>{
  const v=e.target.value.toLowerCase();
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  games.filter(g=>g.title.toLowerCase().includes(v))
  .forEach(g=>{
    const c=document.createElement("div");
    c.className="card";
    c.innerHTML=`<img src="${g.img}"><div class="card-title">${g.title}</div>`;
    c.onclick=()=>openGame(g);
    grid.appendChild(c);
  });
};

loadFeatured();
render();

</script>

</body>
</html>
