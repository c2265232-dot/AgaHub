<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AgaHub v3</title>

<style>
:root{
  --bg:#070c07;
  --panel:#0f1a0f;
  --card:#111a11;
  --accent:#00ff88;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:white;
  overflow-x:hidden;
}

/* TOPBAR */
.topbar{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:var(--panel);
  border-bottom:2px solid var(--accent);
  z-index:50;
}

.logo{
  color:var(--accent);
  font-weight:bold;
}

.search{
  width:40%;
  padding:8px;
  border-radius:8px;
  border:none;
  outline:none;
}

.menuBtn{
  background:transparent;
  border:1px solid var(--accent);
  color:var(--accent);
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

/* HERO */
.hero{
  margin:12px;
  height:180px;
  border-radius:12px;
  overflow:hidden;
  border:1px solid #1f3a1f;
  position:relative;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.heroText{
  position:absolute;
  bottom:10px;
  left:10px;
  background:rgba(0,0,0,0.5);
  padding:6px 10px;
  color:var(--accent);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;
  padding:15px;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid #1f3a1f;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .2s, opacity .5s, left .5s;
  position:relative;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px var(--accent);
}

.card img{
  width:100%;
  height:110px;
  object-fit:cover;
}

.card-title{
  text-align:center;
  padding:8px;
  color:var(--accent);
}

/* SLIDE OUT ANIMATION */
.card.exit{
  animation: slideOutLeft .6s forwards;
}

@keyframes slideOutLeft{
  0%{transform:translateX(0);opacity:1;}
  100%{transform:translateX(-200px);opacity:0;}
}

/* PLAYER */
#player{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:100;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

.closeBtn,.fullBtn{
  position:absolute;
  top:10px;
  z-index:101;
  padding:8px 12px;
  border:none;
  cursor:pointer;
}

.closeBtn{right:10px;background:red;color:white;}
.fullBtn{left:10px;background:var(--accent);}

/* SETTINGS */
.settings{
  position:fixed;
  right:-280px;
  top:0;
  width:250px;
  height:100%;
  background:#0b120b;
  border-left:2px solid var(--accent);
  transition:.3s;
  padding:15px;
  z-index:200;
}

.settings.open{right:0;}

.settingItem{margin:12px 0;}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">💚 AgaHub</div>
  <input id="search" class="search" placeholder="Search games...">
  <button class="menuBtn" onclick="toggleSettings()">⚙</button>
</div>

<div class="hero">
  <img id="heroImg">
  <div class="heroText" id="heroText"></div>
</div>

<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div id="player">
  <button class="fullBtn" onclick="full()">⛶</button>
  <button class="closeBtn" onclick="closeGame()">X</button>
  <iframe id="frame"></iframe>
</div>

<!-- SETTINGS -->
<div class="settings" id="settings">
  <h3 style="color:var(--accent)">Settings</h3>

  <div class="settingItem">
    Accent Color:
    <input type="color" id="colorPicker">
  </div>

  <div class="settingItem">
    <button onclick="reset()">Reset</button>
  </div>
</div>

<script>

const games = [
  {title:"Bad Piggies", img:"https://upload.wikimedia.org/wikipedia/en/3/3e/Bad_Piggies_app_icon.png", link:"https://badpig.vercel.app/", featured:true},

  {title:"Crazy Cattle", img:"https://via.placeholder.com/150", link:"https://crazy-cattle-3d.github.io/"},

  {title:"Slope", img:"https://via.placeholder.com/150", link:"https://slopegame.github.io/"},

  {title:"Run 3", img:"https://via.placeholder.com/150", link:"https://run3.io/"},

  {title:"Minecraft Classic", img:"https://classic.minecraft.net/", link:"https://classic.minecraft.net/"},

  {title:"Geometry Dash Lite", img:"https://via.placeholder.com/150", link:"https://geometrydashlite.io/"},

  {title:"Tunnel Rush", img:"https://via.placeholder.com/150", link:"https://tunnelrush.github.io/"},

  {title:"Drift Hunters", img:"https://via.placeholder.com/150", link:"https://drift-hunters.co/"},

  {title:"Shell Shockers", img:"https://via.placeholder.com/150", link:"https://shellshock.io/"},

  {title:"Paper.io", img:"https://via.placeholder.com/150", link:"https://paper-io.com/"}
];

let heroIndex=0;

function load(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  games.forEach(g=>{
    const c=document.createElement("div");
    c.className="card";
    c.innerHTML=`<img src="${g.img}"><div class="card-title">${g.title}</div>`;
    c.onclick=()=>openGame(g);
    grid.appendChild(c);
  });

  updateHero();
}

function updateHero(){
  const f=games.filter(g=>g.featured||g.title==="Bad Piggies");
  const g=f[heroIndex%f.length];
  document.getElementById("heroImg").src=g.img;
  document.getElementById("heroText").innerText=g.title;
  heroIndex++;
}

setInterval(updateHero,4000);

function openGame(g){
  document.getElementById("frame").src=g.link;
  document.getElementById("player").style.display="block";

  // animate cards out
  document.querySelectorAll(".card").forEach((c,i)=>{
    setTimeout(()=>c.classList.add("exit"), i*20);
    setTimeout(()=>c.classList.remove("exit"), 600);
  });
}

function closeGame(){
  document.getElementById("player").style.display="none";
  document.getElementById("frame").src="";
}

function full(){
  document.getElementById("frame").requestFullscreen();
}

/* SEARCH */
document.getElementById("search").addEventListener("input",(e)=>{
  const v=e.target.value.toLowerCase();
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  games.filter(g=>g.title.toLowerCase().includes(v))
  .forEach(g=>{
    const c=document.createElement("div");
    c.className="card";
    c.innerHTML=`<img src="${g.img}"><div class="card-title">${g.title}</div>`;
    c.onclick=()=>openGame(g);
    grid.appendChild(c);
  });
});

/* SETTINGS */
const picker=document.getElementById("colorPicker");

picker.value=localStorage.getItem("accent")||"#00ff88";
document.documentElement.style.setProperty("--accent",picker.value);

picker.oninput=(e)=>{
  document.documentElement.style.setProperty("--accent",e.target.value);
  localStorage.setItem("accent",e.target.value);
};

function toggleSettings(){
  document.getElementById("settings").classList.toggle("open");
}

function reset(){
  localStorage.clear();
  location.reload();
}

load();

</script>

</body>
</html>
