<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AgaHub v8</title>

<style>
:root{
  --bg:#070c07;
  --panel:#0f1a0f;
  --card:#111a11;
  --accent:#00ff88;
  --text:#fff;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:var(--panel);
  border-bottom:2px solid var(--accent);
}

.logo{color:var(--accent);font-weight:bold;}

.search{
  width:40%;
  padding:8px;
}

/* SETTINGS */
.settings{
  position:fixed;
  right:-260px;
  top:0;
  width:240px;
  height:100%;
  background:var(--panel);
  border-left:2px solid var(--accent);
  transition:.3s;
  padding:10px;
  z-index:1000;
}

.settings.open{right:0;}

/* CATEGORIES */
.categories{
  display:flex;
  gap:8px;
  padding:10px;
  overflow-x:auto;
}

.cat{
  padding:6px 10px;
  border-radius:20px;
  background:#1a2a1a;
  cursor:pointer;
  white-space:nowrap;
}

.cat.active{
  background:var(--accent);
  color:black;
}

/* 🔥 RECOMMENDED */
.carousel{
  overflow:hidden;
  padding:10px;
}

.track{
  display:inline-flex;
  gap:10px;
  animation:scrollRight 12s linear infinite;
}

@keyframes scrollRight{
  from{transform:translateX(-50%);}
  to{transform:translateX(0);}
}

.bigCard{
  min-width:260px;
  height:160px;
  border-radius:14px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
}

.bigCard img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.bigCard span{
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,.6);
  color:var(--accent);
  padding:8px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

@media(max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:500px){
  .grid{grid-template-columns:repeat(1,1fr);}
}

/* CARD */
.card{
  background:var(--card);
  border-radius:10px;
  overflow:hidden;
  animation:in .3s ease;
}

@keyframes in{
  from{transform:translateX(-30px);opacity:0;}
  to{transform:translateX(0);opacity:1;}
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card-title{
  padding:8px;
  color:var(--accent);
  display:flex;
  justify-content:space-between;
}

/* PLAYER */
#player{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:999;
}

iframe{width:100%;height:100%;border:none;}

.btn{
  position:absolute;
  top:10px;
  z-index:1000;
  padding:10px;
  border:none;
}

.close{right:10px;background:red;color:white;}
.full{left:10px;background:var(--accent);}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="logo">💚 AgaHub</div>
  <input class="search" placeholder="Search...">
  <button onclick="toggleSettings()">⚙</button>
</div>

<!-- SETTINGS -->
<div class="settings" id="settings">
  <h3 style="color:var(--accent)">Settings</h3>
  <button onclick="toggleTheme()">Light/Dark</button>
  <br><br>
  Accent:
  <input type="color" id="color">
  <br><br>
  <button onclick="toggleSettings()">Close</button>
</div>

<!-- CATEGORIES -->
<div class="categories" id="cats"></div>

<!-- 🔥 RECOMMENDED (ONLY ALL) -->
<div class="carousel" id="carouselWrap">
  <div class="track" id="track"></div>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div id="player">
  <button class="btn full" onclick="full()">⛶</button>
  <button class="btn close" onclick="closeGame()">X</button>
  <iframe id="frame"></iframe>
</div>

<script>

const games = [
  {t:"Bad Piggies",i:"https://upload.wikimedia.org/wikipedia/en/3/3e/Bad_Piggies_app_icon.png",l:"https://badpig.vercel.app/",c:"Popular",f:true},
  {t:"Crazy Cattle",i:"https://via.placeholder.com/400x300",l:"https://crazy-cattle.github.io/",c:"Action",f:true},
  {t:"Slope",i:"https://via.placeholder.com/400x300",l:"https://slopegame.github.io/",c:"Action",f:true},
  {t:"Run 3",i:"https://via.placeholder.com/400x300",l:"https://run3.io/",c:"Action"},
  {t:"Shell Shockers",i:"https://via.placeholder.com/400x300",l:"https://shellshock.io/",c:"Action"},
  {t:"Tunnel Rush",i:"https://via.placeholder.com/400x300",l:"https://tunnelrush.github.io/",c:"Action"},
  {t:"Paper.io",i:"https://via.placeholder.com/400x300",l:"https://paper-io.com/",c:"Puzzle"}
];

let cat="All";
let fav=JSON.parse(localStorage.getItem("fav")||"[]");

/* SETTINGS */
function toggleSettings(){
  document.getElementById("settings").classList.toggle("open");
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

/* COLOR */
document.getElementById("color").oninput=(e)=>{
  document.documentElement.style.setProperty("--accent",e.target.value);
};

/* CATEGORIES */
const cats=["All","Popular","Action","Puzzle","Favorites"];

const catBox=document.getElementById("cats");

cats.forEach(c=>{
  const d=document.createElement("div");
  d.className="cat";
  d.innerText=c;
  if(c==="All")d.classList.add("active");

  d.onclick=()=>{
    document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
    d.classList.add("active");
    cat=c;
    render();
  };

  catBox.appendChild(d);
});

/* FAVORITE */
function toggleFav(t){
  if(fav.includes(t))fav=fav.filter(x=>x!==t);
  else fav.push(t);
  localStorage.setItem("fav",JSON.stringify(fav));
  render();
}

/* 🔥 RECOMMENDED (ONLY ALL) */
function loadCarousel(){
  const wrap=document.getElementById("carouselWrap");
  const track=document.getElementById("track");

  if(cat!=="All"){
    wrap.style.display="none";
    return;
  }

  wrap.style.display="block";

  const rec=games.filter(g=>g.f);

  track.innerHTML=rec.concat(rec).map(g=>`
    <div class="bigCard" onclick="openGame('${g.l}')">
      <img src="${g.i}">
      <span>${g.t}</span>
    </div>
  `).join("");
}

/* GRID */
function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  let list=games;

  if(cat==="Favorites")list=list.filter(g=>fav.includes(g.t));
  else if(cat!=="All")list=list.filter(g=>g.c===cat);

  list.forEach(g=>{
    const c=document.createElement("div");
    c.className="card";

    const star=fav.includes(g.t)?"⭐":"☆";

    c.innerHTML=`
      <img src="${g.i}">
      <div class="card-title">
        ${g.t}
        <span onclick="event.stopPropagation();toggleFav('${g.t}')">${star}</span>
      </div>
    `;

    c.onclick=()=>openGame(g.l);
    grid.appendChild(c);
  });

  loadCarousel();
}

/* GAME */
function openGame(l){
  document.getElementById("frame").src=l;
  document.getElementById("player").style.display="block";
}

function closeGame(){
  document.getElementById("player").style.display="none";
  document.getElementById("frame").src="";
}

/* FULLSCREEN */
function full(){
  document.getElementById("frame").requestFullscreen();
}

render();

</script>

</body>
</html>
