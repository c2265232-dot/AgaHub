<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aga Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f0b;
  color: white;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: #0f1a0f;
  border-bottom: 2px solid #00ff88;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  color: #00ff88;
}

.search {
  padding: 8px;
  width: 200px;
  border-radius: 8px;
  border: none;
  outline: none;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* GAME CARD */
.card {
  background: #111a11;
  border: 1px solid #1f3a1f;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
  border-color: #00ff88;
  box-shadow: 0 0 15px #00ff88;
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.card-title {
  padding: 10px;
  text-align: center;
  color: #00ff88;
  font-weight: bold;
}

/* HIDE SEARCH RESULTS */
.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">💚 Aga Hub</div>
  <input class="search" id="search" placeholder="Search games..." />
</div>

<div class="grid" id="gameGrid"></div>

<script>
// 🎮 ADD YOUR GAMES HERE
const games = [
  {
    title: "Bad Piggies",
    thumbnail: "https://static.wikia.nocookie.net/angrybirds/images/9/95/Bad_Piggies_Icon_2017.png/revision/latest?cb=20200329183234",
    link: "https://pd70p97.live.codepad.app/Bad%20Piggies.html"
  },
];

// RENDER GAMES
const grid = document.getElementById("gameGrid");

function loadGames(list) {
  grid.innerHTML = "";
  list.forEach(game => {
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => window.open(game.link, "_blank");

    card.innerHTML = `
      <img src="${game.thumbnail}">
      <div class="card-title">${game.title}</div>
    `;

    grid.appendChild(card);
  });
}

loadGames(games);

// SEARCH
document.getElementById("search").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();
  const filtered = games.filter(g => g.title.toLowerCase().includes(value));
  loadGames(filtered);
});
</script>

</body>
</html>
